<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Referenzen – Siso-Team</title>
  <meta name="description" content="Referenzen: Fassaden-, Fenster- und Außenreinigung – eine Auswahl unserer Arbeiten.">
  <style>
    :root{
      --ink:#0b1220; --muted:#4b5563; --line:rgba(2,6,23,.12);
      --grad1:#0e4ebf; --grad2:#1e7ae7; --grad3:#bfe3ff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:linear-gradient(180deg,var(--grad3) 0%, #eaf5ff 40%, #ffffff 100%);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Noto Sans,Arial,sans-serif}
    a{color:inherit;text-decoration:none} a:hover{text-decoration:underline}
    img{max-width:100%;height:auto;display:block;border-radius:14px}
    .container{width:min(1100px,92vw);margin-inline:auto}

    header{position:sticky;top:0;z-index:40;background:linear-gradient(90deg,var(--grad1),var(--grad2));color:#fff;border-bottom:1px solid rgba(255,255,255,.18);box-shadow:0 6px 18px rgba(10,35,90,.25)}
    .nav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0}
    .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:.3px}
    .brand img{height:42px}
    nav ul{display:flex;gap:16px;list-style:none;margin:0;padding:0;flex-wrap:wrap}
    nav a{padding:8px 6px;display:inline-block;color:#eef6ff}

    main{padding:48px 0}
    h1{margin:0 0 10px}
    .sub{color:var(--muted);margin:0 0 16px}

    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .grid figure{margin:0}
    .grid img{transition:transform .25s ease, box-shadow .25s ease}
    .grid a:hover img{transform:translateY(-3px); box-shadow:0 10px 24px rgba(0,0,0,.18)}

    /* Lightbox */
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;padding:16px;z-index:60}
    .lightbox img{max-width:95vw;max-height:90vh;border-radius:14px}
    .lightbox.open{display:flex}
    .lightbox .close{position:absolute;top:10px;right:14px;font-size:28px;color:#fff;cursor:pointer}

    footer{margin-top:28px;border-top:1px solid rgba(255,255,255,.2);background:linear-gradient(180deg,var(--grad2), var(--grad1));color:#eaf6ff;padding:28px 0;box-shadow:0 -6px 18px rgba(10,35,90,.25)}

    @media (max-width:1024px){ .grid{grid-template-columns:repeat(3,1fr)} }
    @media (max-width:900px){ .grid{grid-template-columns:repeat(2,1fr)} }
    @media (max-width:560px){
      .nav{flex-wrap:wrap}
      .brand img{height:38px}
    }
  </style>
</head>
<body>
<header>
  <div class="container nav">
    <div class="brand">
      <img src="assets/IMG-logo.png" alt="Siso-Team Logo">
      <a href="index.html" style="color:#fff;font-weight:900">Siso-Team</a>
    </div>
    <nav aria-label="Hauptnavigation">
      <ul>
        <li><a href="index.html#kontakte">Kontakte</a></li>
        <li><a href="index.html#about">Über uns</a></li>
        <li><a href="index.html#arbeitsplaetze">Arbeitsplätze</a></li>
        <li><a href="referenzen.html" style="text-decoration:underline">Referenzen</a></li>
      </ul>
    </nav>
  </div>
</header>

    <figure><a href="assets/IMG-20250806-WA0072.jpg" class="lb"><img loading="lazy" src="assets/IMG-20250806-WA0072.jpg" alt=""></a></figure>
    <figure><a href="assets/IMG-20250806-WA0074.jpg" class="lb"><img loading="lazy" src="assets/IMG-20250806-WA0074.jpg" alt=""></a></figure>
    <!-- Pair 3 -->
    <figure><a href="assets/IMG-20250806-WA0075.jpg" class="lb"><img loading="lazy" src="assets/IMG-20250806-WA0075.jpg" alt=""></a></figure>
    <figure><a href="assets/IMG-20250806-WA0073.jpg" class="lb"><img loading="lazy" src="assets/IMG-20250806-WA0073.jpg" alt=""></a></figure>

<!-- Lightbox -->
<div class="lightbox" id="lb">
  <span class="close" id="lbClose">×</span>
  <img id="lbImg" src="" alt="">
</div>

<footer>
  <div class="container" style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <small>© <span id="y"></span> Siso-Team</small>
    <div style="display:flex;gap:14px;flex-wrap:wrap">
      <a href="impressum.html">Impressum</a>
      <a href="datenschutzerklaerung.html">Datenschutzerklärung</a>
      <a href="index.html#kontakte">Kontakt</a>
    </div>
  </div>
</footer>

<script>
  document.getElementById('y').textContent = new Date().getFullYear();
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lbImg');
  const lbClose = document.getElementById('lbClose');
  document.querySelectorAll('a.lb').forEach(a=>{
    a.addEventListener('click',e=>{
      e.preventDefault();
      lbImg.src = a.getAttribute('href');
      lb.classList.add('open');
    });
  });
  lbClose.addEventListener('click',()=>lb.classList.remove('open'));
  lb.addEventListener('click',e=>{ if(e.target===lb) lb.classList.remove('open'); });
</script>
</body>
</html>
